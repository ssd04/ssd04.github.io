{{ define "main" }}
<h1>#{{ .Title }}</h1>
<ul class="blog-posts">
  {{ range .Pages.ByDate.Reverse }}
  <li>
    <time>{{ .Date.Format "2006-01-02" }}</time>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
<p><a href="{{ "/posts/" | relURL }}">← all posts</a></p>
{{ end }}

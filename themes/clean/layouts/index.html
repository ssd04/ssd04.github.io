{{ define "main" }}
{{ with .Content }}<div class="page-content">{{ . }}</div>{{ end }}

<h2>recent posts</h2>
<ul class="blog-posts">
  {{ range first 10 (where .Site.RegularPages "Section" "posts") }}
  <li>
    <time>{{ .Date.Format "2006-01-02" }}</time>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}

{{ define "main" }}
{{ if .Title }}<h1>{{ .Title }}</h1>{{ end }}
{{ with .Content }}<div class="page-content">{{ . }}</div>{{ end }}
<ul class="blog-posts">
  {{ range .Pages.ByDate.Reverse }}
  <li>
    <time>{{ .Date.Format "2006-01-02" }}</time>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
  </li>
  {{ end }}
</ul>
{{ end }}
